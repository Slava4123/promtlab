# gitleaks configuration
# Расширяет дефолтные правила и глушит known-false-positives.
# Запускать: gitleaks detect --redact --config .gitleaks.toml

[extend]
# Use default set of rules (наследуем все base patterns).
useDefault = true

[allowlist]
description = "Known false positives and fixture data"

# Фиктивные SHA256-хэши в integration-тестах — не реальные секреты,
# предсказуемые паттерны (abc123def456...) для проверки CRUD операций.
paths = [
  '''.*_test\.go$''',
  '''testdata/.*''',
  '''\.example$''',
  '''\.env\.example$''',
]

# Повторно-используемые фикстуры из PKCE RFC 7636 Appendix B — публичный
# тестовый вектор, не секрет.
regexes = [
  '''dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk''',
]

# Коммиты с уже исправленными false-positives — пример синтаксиса:
# commits = ["ed1aa31cd313329a6f9e27674a7a2b716d0e3b86"]
