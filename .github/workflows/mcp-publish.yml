name: Publish MCP Server

# Публикация MCP-сервера ПромтЛаб в Official MCP Registry
# (registry.modelcontextprotocol.io).
#
# Триггеры:
#   - push тега vX.Y.Z → публикация новой версии + создание GitHub Release
#   - workflow_dispatch → ручной запуск на случай failed предыдущего run'а
#
# Аутентификация: DNS-верификация домена promtlabs.ru через Ed25519.
# Public key в TXT-записи promtlabs.ru, private key в secret
# MCP_DNS_PRIVATE_KEY (64-символьная hex-строка).
# Setup: см. promptvault/docs/MCP-PUBLISHING.md §DNS setup.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для создания GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Verify server.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          JSON_VERSION=$(jq -r .version promptvault/server.json)
          echo "tag=$TAG_VERSION server.json=$JSON_VERSION"
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) != server.json.version ($JSON_VERSION)"
            echo "::error::bump server.json перед git tag"
            exit 1
          fi

      - name: Install mcp-publisher
        run: |
          # Скачиваем последний linux_amd64 binary напрямую из GitHub Releases.
          # Endpoint registry.modelcontextprotocol.io/install больше не работает (404).
          LATEST=$(curl -fsSL https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | jq -r .tag_name)
          echo "mcp-publisher release: $LATEST"
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${LATEST}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf mcp-publisher.tar.gz
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher
          mcp-publisher --version

      - name: Login (DNS)
        working-directory: promptvault
        env:
          KEY: ${{ secrets.MCP_DNS_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::secret MCP_DNS_PRIVATE_KEY не установлен"
            exit 1
          fi
          mcp-publisher login dns --domain=promtlabs.ru --private-key="$KEY"

      - name: Publish
        working-directory: promptvault
        run: mcp-publisher publish

      - name: Verify new version in registry
        run: |
          # Индекс search реестра обновляется с задержкой ~30–120 сек. Ретраим
          # с увеличивающимися паузами — сумма до ~90 сек (6 × 15 сек).
          # Также смотрим запись isLatest=true, а не просто servers[0].
          EXPECTED=$(jq -r .version promptvault/server.json)
          for i in 1 2 3 4 5 6; do
            sleep 15
            CURRENT=$(curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=promtlab" \
              | jq -r '[.servers[] | select(._meta."io.modelcontextprotocol.registry/official".isLatest == true)][0].server.version // "none"')
            echo "attempt $i: registry=$CURRENT expected=$EXPECTED"
            if [ "$CURRENT" = "$EXPECTED" ]; then
              echo "::notice::registry updated to $CURRENT"
              exit 0
            fi
          done
          echo "::error::registry still shows $CURRENT after 90s, expected $EXPECTED"
          exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Автоматически опубликовано в Official MCP Registry:
            https://registry.modelcontextprotocol.io/v0/servers?search=promtlab
