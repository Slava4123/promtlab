name: Publish MCP Server

# Публикация MCP-сервера ПромтЛаб в Official MCP Registry
# (registry.modelcontextprotocol.io).
#
# Триггеры:
#   - push тега vX.Y.Z → публикация новой версии + создание GitHub Release
#   - workflow_dispatch → ручной запуск на случай failed предыдущего run'а
#
# Аутентификация: DNS-верификация домена promtlabs.ru через Ed25519.
# Public key в TXT-записи promtlabs.ru, private key в secret
# MCP_DNS_PRIVATE_KEY (64-символьная hex-строка).
# Setup: см. promptvault/docs/MCP-PUBLISHING.md §DNS setup.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для создания GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Verify server.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          JSON_VERSION=$(jq -r .version promptvault/server.json)
          echo "tag=$TAG_VERSION server.json=$JSON_VERSION"
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) != server.json.version ($JSON_VERSION)"
            echo "::error::bump server.json перед git tag"
            exit 1
          fi

      - name: Install mcp-publisher
        run: |
          # Скачиваем последний linux_amd64 binary напрямую из GitHub Releases.
          # Endpoint registry.modelcontextprotocol.io/install больше не работает (404).
          LATEST=$(curl -fsSL https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | jq -r .tag_name)
          echo "mcp-publisher release: $LATEST"
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${LATEST}/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf mcp-publisher.tar.gz
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher
          mcp-publisher --version

      - name: Login (DNS)
        working-directory: promptvault
        env:
          KEY: ${{ secrets.MCP_DNS_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::secret MCP_DNS_PRIVATE_KEY не установлен"
            exit 1
          fi
          mcp-publisher login dns --domain=promtlabs.ru --private-key="$KEY"

      - name: Publish
        working-directory: promptvault
        run: mcp-publisher publish

      - name: Verify new version in registry
        run: |
          # Индекс search реестра обновляется с задержкой ~30–120 сек. Ретраим
          # с увеличивающимися паузами — сумма до ~90 сек (6 × 15 сек).
          # Также смотрим запись isLatest=true, а не просто servers[0].
          EXPECTED=$(jq -r .version promptvault/server.json)
          for i in 1 2 3 4 5 6; do
            sleep 15
            CURRENT=$(curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=promtlab" \
              | jq -r '[.servers[] | select(._meta."io.modelcontextprotocol.registry/official".isLatest == true)][0].server.version // "none"')
            echo "attempt $i: registry=$CURRENT expected=$EXPECTED"
            if [ "$CURRENT" = "$EXPECTED" ]; then
              echo "::notice::registry updated to $CURRENT"
              exit 0
            fi
          done
          echo "::error::registry still shows $CURRENT after 90s, expected $EXPECTED"
          exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Автоматически опубликовано в Official MCP Registry:
            https://registry.modelcontextprotocol.io/v0/servers?search=promtlab

  # ---------------------------------------------------------------------------
  # Публикация в Smithery (smithery.ai) — коммьюнити-хаб с one-click install.
  # Триггер: только стабильные теги vX.Y.Z (без -rc/-alpha/-beta), чтобы не
  # перетирать listing pre-релизами.
  # Auth: service-token из secret SMITHERY_TOKEN (mint локально: `smithery auth token`).
  # Идемпотентность: при повторной публикации той же версии CLI возвращает ошибку;
  # оборачиваем в `|| true` + последующий grep логов.
  # continue-on-error: пока секрет не настроен и flow не проверен на практике,
  # провал smithery-job не должен блокировать релиз в Registry.
  # ---------------------------------------------------------------------------
  publish-smithery:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Smithery CLI
        run: npm install -g @smithery/cli

      - name: Configure auth
        env:
          SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
        run: |
          if [ -z "$SMITHERY_TOKEN" ]; then
            echo "::warning::secret SMITHERY_TOKEN не установлен — пропускаем"
            exit 0
          fi
          # Формат обнаружен эмпирически из local install на Windows:
          # %APPDATA%/smithery/settings.json содержит {"apiKey": "smry_..."}.
          # На Linux Ubuntu CLI использует XDG_CONFIG_HOME ($HOME/.config).
          # Пишем минимальный settings.json в обе локации для совместимости.
          for dir in "$HOME/.config/smithery" "$HOME/.smithery"; do
            mkdir -p "$dir"
            printf '{"apiKey":"%s","analyticsConsent":false}\n' "$SMITHERY_TOKEN" > "$dir/settings.json"
            chmod 600 "$dir/settings.json"
          done

      - name: Publish to Smithery
        env:
          SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_TOKEN }}
        run: |
          if [ -z "$SMITHERY_TOKEN" ]; then
            echo "::warning::SMITHERY_TOKEN отсутствует — публикация пропущена"
            exit 0
          fi
          OUTPUT=$(smithery mcp publish "https://promtlabs.ru/mcp" \
            -n "@slava24122003/promptvault" 2>&1) || PUBLISH_EXIT=$?
          echo "$OUTPUT"
          if [ "${PUBLISH_EXIT:-0}" != "0" ]; then
            # Идемпотентность: если ошибка про существующую версию — ок.
            if echo "$OUTPUT" | grep -qiE "already (exists|published)|duplicate|same version"; then
              echo "::notice::version уже опубликована, пропускаем"
              exit 0
            fi
            exit "$PUBLISH_EXIT"
          fi

  # ---------------------------------------------------------------------------
  # Авто-PR в punkpeye/awesome-mcp-servers (GitHub-список, 40k+ ★).
  # Идемпотентно: peter-evans/create-pull-request обновляет существующий PR
  # при повторном push на ту же ветку. Скрипт add_awesome_mcp.py выходит
  # с кодом 78, если строка уже есть — тогда PR-шаг просто skip.
  # Нужен секрет AWESOME_MCP_PAT: fine-grained PAT с contents:write +
  # pull-requests:write на Slava4123/awesome-mcp-servers (форк).
  # ---------------------------------------------------------------------------
  publish-awesome-mcp:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    continue-on-error: true
    steps:
      - name: Checkout our repo (for the script)
        uses: actions/checkout@v4
        with:
          path: self

      - name: Checkout upstream awesome-mcp-servers
        uses: actions/checkout@v4
        with:
          repository: punkpeye/awesome-mcp-servers
          token: ${{ secrets.AWESOME_MCP_PAT }}
          path: awesome
          fetch-depth: 1

      - name: Insert PromptVault entry
        id: insert
        run: |
          set +e
          python3 self/.github/scripts/add_awesome_mcp.py awesome
          RC=$?
          set -e
          if [ "$RC" = "78" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::entry уже есть — PR не нужен"
            exit 0
          fi
          if [ "$RC" != "0" ]; then
            exit "$RC"
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create/update PR
        if: steps.insert.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          path: awesome
          token: ${{ secrets.AWESOME_MCP_PAT }}
          push-to-fork: Slava4123/awesome-mcp-servers
          branch: add-promptvault
          commit-message: "Add PromptVault (ПромтЛаб) — self-hosted AI prompt library"
          title: "Add PromptVault (ПромтЛаб) — self-hosted AI prompt library"
          body-path: self/.github/awesome-mcp-pr-body.md
          delete-branch: true

  # ---------------------------------------------------------------------------
  # Passive verify: через ~30 мин после публикации проверяем, что сервер
  # появился в сторонних каталогах-агрегаторах.
  # Glama — HTML-grep (публичный API не документирован).
  # PulseMCP — JSON API /v0.1/servers?search=… (требует X-API-Key).
  # Оба проверены мягко (continue-on-error), задача — сигнал в логах.
  # ---------------------------------------------------------------------------
  verify-catalogs:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    continue-on-error: true
    steps:
      - name: Wait for downstream indexers
        run: sleep 1800  # 30 мин

      - name: Check PulseMCP
        env:
          PULSEMCP_API_KEY: ${{ secrets.PULSEMCP_API_KEY }}
          PULSEMCP_TENANT_ID: ${{ secrets.PULSEMCP_TENANT_ID }}
        run: |
          if [ -z "$PULSEMCP_API_KEY" ]; then
            echo "::warning::PULSEMCP_API_KEY не установлен — пробуем без auth"
          fi
          RESP=$(curl -fsS \
            ${PULSEMCP_API_KEY:+-H "X-API-Key: $PULSEMCP_API_KEY"} \
            ${PULSEMCP_TENANT_ID:+-H "X-Tenant-ID: $PULSEMCP_TENANT_ID"} \
            "https://api.pulsemcp.com/v0.1/servers?search=promtlab&limit=10" || echo '{}')
          echo "$RESP" | jq . 2>/dev/null || echo "$RESP"
          if echo "$RESP" | jq -e '.servers | length > 0' > /dev/null 2>&1; then
            echo "::notice::PulseMCP: найдено"
          else
            echo "::warning::PulseMCP: не найдено (autosync может занимать до нескольких дней)"
          fi

      - name: Check Glama
        run: |
          # Glama без публичного JSON API — парсим HTML search-страницу.
          HTML=$(curl -fsS -L "https://glama.ai/mcp/servers?query=promtlab" || true)
          if echo "$HTML" | grep -q "promtlabs/promptvault"; then
            echo "::notice::Glama: найдено"
          else
            echo "::warning::Glama: не найдено (autosync может занимать до недели)"
          fi
