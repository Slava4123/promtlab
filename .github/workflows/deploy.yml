name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'promptvault/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: promptvault/backend/go.mod
          cache-dependency-path: promptvault/backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: promptvault/backend

      - name: Security scan (Go)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test-backend:
    name: Test Backend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: promptvault/backend/go.mod
          cache-dependency-path: promptvault/backend/go.sum

      - name: Run unit tests
        run: go test -short -race -count=1 -timeout=5m ./...

  test-frontend:
    name: Test Frontend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: promptvault/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

  deploy:
    name: Deploy
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/promtlab

            echo "=== Pulling latest code ==="
            git fetch origin main
            git pull --ff-only origin main || { echo "WARN: ff-only failed, forcing reset"; git reset --hard origin/main; }

            echo "=== Building and deploying ==="
            cd promptvault
            set +u
            set -a
            source .env.prod
            set +a
            set -u

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "=== Cleaning up old images ==="
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 2m
          script: |
            set -euo pipefail
            echo "=== Waiting for services to start ==="
            sleep 15

            for i in 1 2 3 4 5; do
              HEALTH=$(docker compose -f ~/promtlab/promptvault/docker-compose.prod.yml exec -T api wget -qO- http://localhost:8080/api/health 2>&1 || true)
              if echo "$HEALTH" | grep -q '"ok"'; then
                echo "Health check PASSED (attempt $i): $HEALTH"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done

            echo "ERROR: Health check failed after 5 attempts"
            exit 1
