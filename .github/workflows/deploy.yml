name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'promptvault/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: promptvault/backend/go.mod
          cache-dependency-path: promptvault/backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: promptvault/backend

      - name: Security scan (Go)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test-backend:
    name: Test Backend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: promptvault/backend/go.mod
          cache-dependency-path: promptvault/backend/go.sum

      - name: Run unit tests
        run: go test -short -race -count=1 -timeout=5m ./...

  test-frontend:
    name: Test Frontend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: promptvault/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

  test-extension:
    name: Test & Build Extension
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: promptvault/extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: promptvault/extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run

      - name: Build extension (Chrome MV3)
        run: npx wxt build

      - name: Zip extension for CWS
        run: npx wxt zip

      - name: Check bundle size (< 5 MB unpacked)
        run: |
          SIZE=$(du -sb .output/chrome-mv3 | cut -f1)
          echo "Unpacked size: $SIZE bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::error::Extension unpacked size $SIZE exceeds 5 MB"
            exit 1
          fi

      - name: Check zip size (< 15 MB CWS limit)
        run: |
          ZIP=$(find .output -name "*.zip" -type f | head -1)
          [ -z "$ZIP" ] && { echo "::error::No zip produced"; exit 1; }
          SIZE=$(stat -c%s "$ZIP")
          echo "Zip size: $SIZE bytes ($ZIP)"
          if [ "$SIZE" -gt 15728640 ]; then
            echo "::error::Extension zip size $SIZE exceeds CWS 15 MB limit"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: promptvault-extension-chrome-${{ github.sha }}
          path: promptvault/extension/.output/*.zip
          retention-days: 30

  build-push:
    name: Build & Push Images
    needs: [test-backend, test-frontend, test-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 нужен для sentry-cli releases set-commits --auto,
          # чтобы он мог прочитать git log и связать release с commits.
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: promptvault/backend
          file: promptvault/backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/slava4123/promtlab-api:latest
            ghcr.io/slava4123/promtlab-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: promptvault
          file: promptvault/Dockerfile.frontend-nginx
          push: true
          tags: |
            ghcr.io/slava4123/promtlab-frontend:latest
            ghcr.io/slava4123/promtlab-frontend:${{ github.sha }}
          build-args: |
            DOMAIN=${{ secrets.DOMAIN }}
            SENTRY_DOMAIN=${{ secrets.SENTRY_DOMAIN }}
            VITE_SENTRY_ENABLED=${{ vars.VITE_SENTRY_ENABLED || 'false' }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=production
            VITE_SENTRY_RELEASE=${{ github.sha }}
            VITE_SENTRY_TRACES_SAMPLE_RATE=${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.0' }}
          # cache-from намеренно отключён: BuildKit GHA cache не инвалидирует
          # cache при изменении build-args (известная проблема), из-за чего
          # VITE_SENTRY_* литералы не попадают в bundle (Vite tree-shaking
          # вырезает Sentry init как dead code если env vars пустые).
          # +2 мин на build, зато гарантированно свежий bundle при каждом deploy.
          no-cache: true

      # Отдельный local build для source maps — Docker build выше кладёт maps
      # внутрь image в dist/assets/*.map (sourcemap: "hidden" в vite.config.ts),
      # но извлекать их из image сложнее чем сделать один npm run build снаружи.
      # +30-60 сек к CI time, но код проще и изолирован.
      #
      # Весь блок no-op если SENTRY_AUTH_TOKEN secret не задан — т.е. до того
      # как пользователь завершит setup GlitchTip и добавит токен в GitHub.
      - name: Setup Node.js for source maps build
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: promptvault/frontend/package-lock.json

      - name: Build frontend for source maps upload
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: promptvault/frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_SENTRY_ENABLED: 'true'
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE || '0.0' }}
        run: |
          npm ci
          npm run build

      - name: Upload source maps to GlitchTip
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: promptvault/frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_FRONTEND }}
        run: |
          set -e
          # Создать release (idempotent — если уже существует, cli ругается но продолжает)
          npx @sentry/cli@latest --url "$SENTRY_URL" releases new "${{ github.sha }}" || true
          # Загрузить source maps. --url-prefix '~/assets/' — это путь как они
          # будут запрошены браузером (nginx раздаёт dist/assets/* под /assets/*).
          npx @sentry/cli@latest --url "$SENTRY_URL" sourcemaps upload \
            --release "${{ github.sha }}" \
            --url-prefix '~/assets/' \
            ./dist/assets
          # Finalize — помечает release как deployed.
          npx @sentry/cli@latest --url "$SENTRY_URL" releases finalize "${{ github.sha }}" || true
          # Attach commits. Не критично — если fail, release всё равно работает.
          npx @sentry/cli@latest --url "$SENTRY_URL" releases set-commits "${{ github.sha }}" --auto || echo "set-commits skipped (non-critical)"

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd ~/promtlab

            echo "=== Pulling latest code ==="
            git fetch origin main
            git pull --ff-only origin main || { echo "WARN: ff-only failed, forcing reset"; git reset --hard origin/main; }

            cd promptvault

            # Обновить SENTRY_RELEASE в .env.prod на текущий commit SHA перед
            # перезапуском api — sentry-go прочитает его при старте и запишет
            # в каждое отправляемое в GlitchTip событие. Это связывает issues
            # с commits в GlitchTip release tracking (загруженные source maps
            # в build-push job уже привязаны к тому же GITHUB_SHA).
            if [ -f .env.prod ]; then
              if grep -q '^SENTRY_RELEASE=' .env.prod; then
                sed -i "s|^SENTRY_RELEASE=.*|SENTRY_RELEASE=${GITHUB_SHA}|" .env.prod
                echo "=== Updated SENTRY_RELEASE in .env.prod ==="
              else
                echo "SENTRY_RELEASE=${GITHUB_SHA}" >> .env.prod
                echo "=== Added SENTRY_RELEASE to .env.prod ==="
              fi
            fi

            # Phase 15 Observability: подставляем TELEGRAM_CHAT_ID из .env.prod
            # в alertmanager.yml. Файл в git хранит placeholder chat_id: 1
            # (chat_id это user ID, формально не секрет, но владелец предпочёл
            # держать его в env, не в публичном репо). Применяется на каждый
            # deploy — git reset --hard в pull шаге выше может откатить файл.
            if [ -f infra/alertmanager/alertmanager.yml ]; then
              if grep -q "^TELEGRAM_CHAT_ID=" .env.prod; then
                CHAT_ID=$(grep "^TELEGRAM_CHAT_ID=" .env.prod | cut -d= -f2)
                if [ -n "$CHAT_ID" ] && [ "$CHAT_ID" != "1" ]; then
                  sed -i "s/^        chat_id: 1$/        chat_id: $CHAT_ID/" infra/alertmanager/alertmanager.yml
                  echo "=== Substituted TELEGRAM_CHAT_ID into alertmanager.yml ==="
                else
                  echo "WARN: TELEGRAM_CHAT_ID empty or =1, alertmanager will not deliver"
                fi
              else
                echo "WARN: TELEGRAM_CHAT_ID not in .env.prod, alertmanager skipped"
              fi
            fi

            echo "=== Pulling images from GHCR ==="
            set +u
            set -a
            source .env.prod
            set +a
            set -u

            # Сохраняем текущие images как :prev для отката
            docker tag ghcr.io/slava4123/promtlab-api:latest ghcr.io/slava4123/promtlab-api:prev 2>/dev/null || true
            docker tag ghcr.io/slava4123/promtlab-frontend:latest ghcr.io/slava4123/promtlab-frontend:prev 2>/dev/null || true

            docker compose -f docker-compose.prod.yml pull

            echo "=== Deploying ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Health check ==="
            sleep 15
            OK=false
            for i in 1 2 3 4 5; do
              HEALTH=$(docker compose -f docker-compose.prod.yml exec -T api wget -qO- http://localhost:8080/api/health 2>&1 || true)
              if echo "$HEALTH" | grep -q '"ok"'; then
                echo "Health check PASSED (attempt $i): $HEALTH"
                OK=true
                break
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done

            if [ "$OK" = true ]; then
              echo "=== Deploy successful, cleaning up ==="
              docker image prune -f
            else
              echo "=== Health check FAILED, rolling back to :prev ==="
              docker tag ghcr.io/slava4123/promtlab-api:prev ghcr.io/slava4123/promtlab-api:latest
              docker tag ghcr.io/slava4123/promtlab-frontend:prev ghcr.io/slava4123/promtlab-frontend:latest
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              echo "=== Rolled back to previous version ==="
              exit 1
            fi
