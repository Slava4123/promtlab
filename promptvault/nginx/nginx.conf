# HTTP -> HTTPS redirect (handled by jonasal/nginx-certbot automatically)

# Bot detection для SEO: при матче UA → роутим /p/<slug> на backend (server-rendered HTML).
# Обычные юзеры получают SPA. Список покрывает: search engines, соц-парсеры превью, AI-боты.
# Source: Prerender.io official list 2026 (https://docs.prerender.io/docs/how-to-add-additional-bots).
map $http_user_agent $is_bot {
    default                              0;
    ~*googlebot                          1;
    ~*bingbot                            1;
    ~*yandex(bot|images)                 1;
    ~*duckduckbot                        1;
    ~*baiduspider                        1;
    ~*applebot                           1;
    ~*facebookexternalhit                1;
    ~*facebot                            1;
    ~*twitterbot                         1;
    ~*linkedinbot                        1;
    ~*slackbot                           1;
    ~*telegrambot                        1;
    ~*whatsapp                           1;
    ~*vkshare                            1;
    ~*discordbot                         1;
    ~*pinterest                          1;
    ~*tumblr                             1;
    ~*redditbot                          1;
    ~*embedly                            1;
    # AI-боты 2026 (тоже хотят чистый HTML)
    ~*gptbot                             1;
    ~*claudebot                          1;
    ~*claude-web                         1;
    ~*perplexitybot                      1;
    ~*amazonbot                          1;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};
    charset utf-8;
    # Расширяем дефолтный список mime-типов, к которым добавляется ; charset=utf-8.
    # Без этого .md и .json (и неявные text/markdown от mime.types) уезжают
    # без charset → mojibake в браузере для кириллицы.
    charset_types text/plain text/html text/xml text/css text/javascript
                  text/markdown application/javascript application/json
                  application/rss+xml application/atom+xml;

    # SSL certificates managed by jonasal/nginx-certbot
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://${SENTRY_DOMAIN}; font-src 'self'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # index.html — no cache (always fresh on deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Security headers (must repeat — nginx drops server-level add_header when location has its own)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://${SENTRY_DOMAIN}; font-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Static assets — long cache with immutable
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Security headers (must repeat — nginx drops server-level add_header when location has its own)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://${SENTRY_DOMAIN}; font-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        try_files $uri =404;
    }

    # Markdown-зеркала (llms.txt-стандарт). mime.types по умолчанию не знает
    # .md → application/octet-stream; default_type перебивает только в этом
    # location, не ломая глобальные mime (.txt → text/plain и т.д.).
    location ~* \.md$ {
        default_type text/markdown;
        add_header Cache-Control "public, max-age=300" always;
        # Security headers (must repeat — nginx drops server-level add_header when location has its own)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://${SENTRY_DOMAIN}; font-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        try_files $uri =404;
    }

    # SPA fallback — serves index.html for all unmatched routes
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Security headers (must repeat)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://${SENTRY_DOMAIN}; font-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        try_files $uri $uri/ /index.html;
    }

    # SEO endpoints — sitemap.xml для поисковиков. Backend генерирует XML с
    # in-memory cache 1ч, frontend нужен только для serve.
    location = /sitemap.xml {
        proxy_pass http://api:8080/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /p/<slug> — публичные промпты. Bot-UA получают server-rendered HTML
    # (полный <head> с OG/JSON-LD), обычные юзеры — SPA через try_files.
    # `if` внутри location используется только для proxy_pass — безопасный
    # сценарий по https://nginx.org/en/docs/http/ngx_http_rewrite_module.html#if.
    location ~ ^/p/[a-zA-Z0-9._-]+$ {
        if ($is_bot) {
            proxy_pass http://api:8080;
            break;
        }
        try_files $uri /index.html;
    }

    # Proxy API to Go backend
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header X-Accel-Buffering "no" always;
        # Security headers for API (CSP/X-Frame-Options omitted — apply only to HTML documents)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # MCP Streamable HTTP — backend mounts POST/GET/DELETE /mcp (см. internal/app/app.go)
    # SPA-CSP (connect-src 'self') не касается: MCP-клиенты ходят с сервера/десктопа, не из браузера.
    location = /mcp {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streamable HTTP: нужен SSE-режим (server→client события) без буферизации.
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering "no" always;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
}

# GlitchTip — self-hosted Sentry-compatible error tracking UI + SDK endpoint
server {
    listen 443 ssl;
    http2 on;
    server_name ${SENTRY_DOMAIN};
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/${SENTRY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SENTRY_DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${SENTRY_DOMAIN}/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # GlitchTip события могут быть большими (stack traces + breadcrumbs + context).
    # Sentry SDK envelope обычно 50-500 KB, но может доходить до 5 MB при больших stack traces.
    client_max_body_size 20M;

    # Security headers — менее строгие чем PromptLab, т.к. GlitchTip UI использует inline scripts.
    # CSP намеренно НЕ ставим, чтобы не ломать GlitchTip UI.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://glitchtip-web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # GlitchTip Django app — не требует long-poll, но оставим комфортные timeouts.
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # WebSocket support для realtime UI обновлений (если GlitchTip их использует).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
