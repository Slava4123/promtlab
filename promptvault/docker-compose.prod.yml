services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    extra_hosts:
      - "smtp-relay:host-gateway"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  smtp-relay:
    image: alpine/socat:latest
    command: TCP-LISTEN:2525,fork,reuseaddr TCP:smtp.gmail.com:587
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend-nginx
      args:
        - DOMAIN=${DOMAIN}
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CERTBOT_DOMAINS=${DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app:

volumes:
  letsencrypt:
