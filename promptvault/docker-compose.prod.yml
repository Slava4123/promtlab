services:
  api:
    image: ghcr.io/slava4123/promtlab-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/slava4123/promtlab-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend-nginx
      args:
        - DOMAIN=${DOMAIN}
        - SENTRY_DOMAIN=${SENTRY_DOMAIN}
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CERTBOT_DOMAINS=${DOMAIN},${SENTRY_DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # GlitchTip: self-hosted Sentry-compatible error tracking.
  # Docs: https://glitchtip.com/documentation/install
  # Auth Token + Source Maps upload: enabled via GitHub Actions workflow

  # One-shot migration runner — применяет Django миграции до старта web/worker.
  # Запускается при каждом docker compose up -d:
  #   - Если миграции новые → применяет и exit 0
  #   - Если уже применены → "No migrations to apply" и exit 0 (идемпотентно)
  # web/worker ждут через depends_on.condition: service_completed_successfully.
  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --no-input
    env_file: .env.glitchtip
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - app
    restart: "no"
    depends_on:
      - glitchtip-valkey
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    env_file: .env.glitchtip
    volumes:
      - ./ca.crt:/app/ca.crt:ro
      - glitchtip-uploads:/code/uploads
    networks:
      - app
    # Bind к localhost — наружу доступ только через nginx reverse proxy.
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    # Memory limit — soft cap, upgrade VPS если нагрузка растёт.
    # 768 MB комфортно для gunicorn workers=3 + Django ORM caches.
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      glitchtip-valkey:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully

  # GlitchTip worker совмещает celery worker + beat через run-celery-with-beat.sh
  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    env_file: .env.glitchtip
    volumes:
      - ./ca.crt:/app/ca.crt:ro
      - glitchtip-uploads:/code/uploads
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      glitchtip-valkey:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully

  # Valkey — Redis-compatible, lighter footprint (Valkey 8+ fork Redis 7.2)
  glitchtip-valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Phase 15 Observability ===
  # Стартуют автоматически вместе с остальным стеком.
  # PRE-УСЛОВИЯ перед deploy:
  #   1. VPS upgrade до 4 GB+ (P1) — без этого OOM (текущие limits 2.1 GB + 480 MB новых).
  #   2. На VPS положить Telegram bot_token:
  #        mkdir -p infra/alertmanager/secrets
  #        echo -n "$TELEGRAM_BOT_TOKEN" > infra/alertmanager/secrets/bot_token
  #        chmod 600 infra/alertmanager/secrets/bot_token
  #   3. На VPS заменить chat_id placeholder в alertmanager.yml:
  #        sed -i "s/chat_id: 1$/chat_id: $TELEGRAM_CHAT_ID/" infra/alertmanager/alertmanager.yml
  # См. docs/PHASE15_OBSERVABILITY_PLAN.md и docs/OBSERVABILITY.md.

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yaml:/etc/prometheus/rules/alerts.yaml:ro
      - prometheus-data:/prometheus
    # Bind 127.0.0.1 — UI доступен только через SSH tunnel:
    # ssh -L 9090:127.0.0.1:9090 deploy@85.239.39.45
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # secrets/ — gitignored, на VPS:
      #   mkdir -p infra/alertmanager/secrets
      #   echo -n "$TELEGRAM_BOT_TOKEN" > infra/alertmanager/secrets/bot_token
      #   chmod 600 infra/alertmanager/secrets/bot_token
      # И sed-replace chat_id placeholder в alertmanager.yml (см. docs/OBSERVABILITY.md Шаг D).
      - ./infra/alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app:

volumes:
  letsencrypt:
  glitchtip-uploads:
  prometheus-data:
  alertmanager-data:
