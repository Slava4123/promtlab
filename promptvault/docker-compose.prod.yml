services:
  api:
    image: ghcr.io/slava4123/promtlab-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/slava4123/promtlab-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend-nginx
      args:
        - DOMAIN=${DOMAIN}
        - SENTRY_DOMAIN=${SENTRY_DOMAIN}
        - GRAFANA_DOMAIN=${GRAFANA_DOMAIN}
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CERTBOT_DOMAINS=${DOMAIN},${SENTRY_DOMAIN},${GRAFANA_DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # GlitchTip: self-hosted Sentry-compatible error tracking.
  # Docs: https://glitchtip.com/documentation/install
  # Auth Token + Source Maps upload: enabled via GitHub Actions workflow

  # One-shot migration runner — применяет Django миграции до старта web/worker.
  # Запускается при каждом docker compose up -d:
  #   - Если миграции новые → применяет и exit 0
  #   - Если уже применены → "No migrations to apply" и exit 0 (идемпотентно)
  # web/worker ждут через depends_on.condition: service_completed_successfully.
  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate --no-input
    env_file: .env.glitchtip
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - app
    restart: "no"
    depends_on:
      - glitchtip-valkey
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    env_file: .env.glitchtip
    volumes:
      - ./ca.crt:/app/ca.crt:ro
      - glitchtip-uploads:/code/uploads
    networks:
      - app
    # Bind к localhost — наружу доступ только через nginx reverse proxy.
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    # Memory limit — soft cap, upgrade VPS если нагрузка растёт.
    # 768 MB комфортно для gunicorn workers=3 + Django ORM caches.
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      glitchtip-valkey:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully

  # GlitchTip worker совмещает celery worker + beat через run-celery-with-beat.sh
  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    env_file: .env.glitchtip
    volumes:
      - ./ca.crt:/app/ca.crt:ro
      - glitchtip-uploads:/code/uploads
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      glitchtip-valkey:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully

  # Valkey — Redis-compatible, lighter footprint (Valkey 8+ fork Redis 7.2)
  glitchtip-valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Phase 15 Observability ===
  # Стартуют автоматически вместе с остальным стеком.
  # PRE-УСЛОВИЯ перед deploy:
  #   1. VPS upgrade до 4 GB+ (P1) — без этого OOM (текущие limits 2.1 GB + 480 MB новых).
  #   2. На VPS положить Telegram bot_token:
  #        mkdir -p infra/alertmanager/secrets
  #        echo -n "$TELEGRAM_BOT_TOKEN" > infra/alertmanager/secrets/bot_token
  #        chmod 600 infra/alertmanager/secrets/bot_token
  #   3. На VPS заменить chat_id placeholder в alertmanager.yml:
  #        sed -i "s/chat_id: 1$/chat_id: $TELEGRAM_CHAT_ID/" infra/alertmanager/alertmanager.yml
  # См. docs/PHASE15_OBSERVABILITY_PLAN.md и docs/OBSERVABILITY.md.

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      # Phase 16 Этап 7: retention 30d → 90d для year-quarter compares,
      # 2GB → 10GB cap (на 80GB VPS disk запас огромный).
      - --storage.tsdb.retention.time=90d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yaml:/etc/prometheus/rules/alerts.yaml:ro
      - ./infra/prometheus/recording_rules.yaml:/etc/prometheus/rules/recording_rules.yaml:ro
      - ./infra/prometheus/slo_rules.yaml:/etc/prometheus/rules/slo_rules.yaml:ro
      - prometheus-data:/prometheus
    # Bind 127.0.0.1 — UI доступен только через SSH tunnel:
    # ssh -L 9090:127.0.0.1:9090 deploy@85.239.39.45
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # secrets/ — gitignored, на VPS:
      #   mkdir -p infra/alertmanager/secrets
      #   echo -n "$TELEGRAM_BOT_TOKEN" > infra/alertmanager/secrets/bot_token
      #   chmod 600 infra/alertmanager/secrets/bot_token
      # И sed-replace chat_id placeholder в alertmanager.yml (см. docs/OBSERVABILITY.md Шаг D).
      - ./infra/alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Phase 16 Observability — system + DB + container + uptime exporters ===

  # node-exporter — host-level metrics (CPU, RAM, Disk, Network, Load avg).
  # Mount /proc, /sys, / (rootfs) read-only с rslave propagation для динамических FS.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    pid: host
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # postgres-exporter — pg_stat_* views для DB monitoring (connections, locks,
  # slow queries, table sizes).
  #
  # Использует gen_user (тот же что api), не отдельный metrics_user — managed
  # Postgres Timeweb не даёт gen_user'у grant pg_monitor (требуется admin role
  # доступный только через панель Timeweb). gen_user имеет CONNECT и read-access
  # к application data, что покрывает default queries postgres-exporter.
  # Security: exporter в Docker network internal (нет port mapping наружу).
  # TODO: при возможности admin-доступа к Postgres — мигрировать на metrics_user
  # с pg_monitor role (read-only, минимальные привилегии).
  #
  # sslmode=require вместо verify-full — postgres-exporter не имеет ca.crt
  # mount-pattern совместимого с Go pq driver. Используем require (TLS
  # encryption без cert verification), data всё равно идёт по TLS.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      - DATA_SOURCE_NAME=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=require
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # cAdvisor — per-container resource usage (CPU, memory, network, IO).
  # Дополняет node-exporter (host-level) per-process granularity.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    # --docker_only=true — собирать метрики только Docker containers (через
    # docker.sock), игнорировать system cgroups (init.scope, system.slice).
    # Без этого container_memory/cpu метрики приходят с id="/system.slice/..."
    # без полезного name label, dashboards не могут breakdown'ить.
    command:
      - --docker_only=true
      - --store_container_labels=false
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # blackbox-exporter — external HTTP probes для uptime monitoring.
  # Prometheus scrape с params (target URL) → blackbox делает HTTP request
  # → возвращает probe_success, probe_duration_seconds, probe_http_status_code.
  # Покрывает случаи когда Prometheus сам жив, но api/frontend упали.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./infra/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # === Phase 16 Этап 3 — Distributed Tracing (Tempo) ===

  # Tempo — distributed trace storage. Single-binary mode, filesystem
  # storage, 7d retention. OTLP gRPC :4317 принимает spans от api.
  tempo:
    image: grafana/tempo:2.6.0
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      # Mount /var/tempo (не /tempo) — в Tempo image /tempo это binary file,
      # mount поверх него вызывает "source ... is not directory" error.
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"  # Tempo API (для Grafana datasource через Docker net)
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === Phase 16 Этап 2 — Logs (Loki + Promtail) ===

  # Loki — log aggregation. Single-binary mode, filesystem storage,
  # 7d retention. Auth disabled (Docker network internal).
  loki:
    image: grafana/loki:3.6.0
    # user 0 — Loki image runs as 10001:10001 by default, но named volume
    # принадлежит root → permission denied. root inside Docker network
    # internal — security risk минимальный.
    user: "0"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Promtail — log shipper, читает Docker container logs с host
  # и пушит в Loki. Mount /var/lib/docker/containers + docker socket
  # для Docker SD (service discovery с labels).
  promtail:
    image: grafana/promtail:3.6.0
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/promtail
    networks:
      - app
    restart: unless-stopped
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 96M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    # Bind 127.0.0.1 — наружу только через nginx vhost grafana.promtlabs.ru.
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app:

volumes:
  letsencrypt:
  glitchtip-uploads:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  loki-data:
  promtail-positions:
  tempo-data:
