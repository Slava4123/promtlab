<!doctype html>
<html lang="ru" prefix="og: http://ogp.me/ns#">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{.Title}} — ПромтЛаб</title>
  <meta name="description" content="{{.Description}}">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="{{.CanonicalURL}}">

  <!-- Open Graph (Telegram, VK, Facebook, LinkedIn) -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{.Title}}">
  <meta property="og:description" content="{{.Description}}">
  <meta property="og:url" content="{{.CanonicalURL}}">
  <meta property="og:image" content="{{.ImageURL}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="ПромтЛаб">
  <meta property="og:locale" content="ru_RU">
  <meta property="article:published_time" content="{{.DatePublished}}">
  <meta property="article:modified_time" content="{{.DateModified}}">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{.Title}}">
  <meta name="twitter:description" content="{{.Description}}">
  <meta name="twitter:image" content="{{.ImageURL}}">

  <!-- Schema.org Article (JSON-LD) — для Google rich results, AI-парсеров. -->
  <script type="application/ld+json">{{.JSONLD}}</script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6;
           color: #111; background: #fafafa; }
    h1 { font-size: 1.75rem; margin-bottom: .5rem; }
    .meta { color: #666; font-size: .9rem; margin-bottom: 2rem; }
    pre { white-space: pre-wrap; background: #fff; padding: 1rem; border-radius: 8px;
          border: 1px solid #e5e5e5; overflow-x: auto; }
    a { color: #6d28d9; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e5e5e5;
             font-size: .85rem; color: #666; }
  </style>
</head>
<body>
  <article>
    <h1>{{.Title}}</h1>
    <div class="meta">Опубликовано: {{.DatePublishedHuman}} · Источник: <a href="{{.CanonicalURL}}">ПромтЛаб</a></div>
    <pre>{{.Content}}</pre>
  </article>
  <footer>
    Это публичный AI-промпт из библиотеки <a href="https://promtlabs.ru/">ПромтЛаб</a> —
    self-hosted менеджера промптов с командной работой и MCP-интеграцией для Claude/Cursor.
  </footer>
</body>
</html>
