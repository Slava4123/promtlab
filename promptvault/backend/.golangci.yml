version: "2"

run:
  timeout: 2m

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprintln
        - fmt.Fprintf
        - (encoding/json.Encoder).Encode
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - linters:
          - staticcheck
        text: "ST1005"
