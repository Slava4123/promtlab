services:
  postgres:
    image: postgres:18-alpine
    env_file: .env.dev
    ports:
      - "5433:5432"
    volumes:
      # PG18 хранит данные в major-version-specific подпапке
      # (/var/lib/postgresql/18/docker). Монтируем volume на родительскую
      # директорию — per recommendation в логе postgres:18 и
      # https://github.com/docker-library/postgres/pull/1259.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file: .env.dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file: .env.dev
    environment:
      # CHOKIDAR polling needed for reliable file watching on Windows/WSL bind mounts.
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount the whole frontend directory so host edits trigger Vite HMR.
      - ./frontend:/app
      # Anonymous volume shields node_modules installed inside the image from
      # being overwritten by the bind mount above (host may not have them, or
      # may have platform-specific binaries for the host OS, not alpine).
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
