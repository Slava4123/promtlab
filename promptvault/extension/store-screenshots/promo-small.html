<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 440px; height: 280px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #4c1d95 100%); display: flex; align-items: center; justify-content: center; }
  .wrap { text-align: center; padding: 24px; }
  .logo { width: 52px; height: 52px; border-radius: 14px; background: white; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 28px; font-weight: 700; margin: 0 auto 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .title { color: white; font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
  .sub { color: rgba(255,255,255,0.8); font-size: 13px; line-height: 1.5; max-width: 340px; margin: 0 auto; }
  .badges { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
  .badge { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: white; font-weight: 500; border: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">П</div>
    <div class="title">ПромтЛаб</div>
    <div class="sub">Библиотека AI-промптов прямо в ChatGPT, Claude, Gemini и Perplexity</div>
    <div class="badges">
      <div class="badge">ChatGPT</div>
      <div class="badge">Claude</div>
      <div class="badge">Gemini</div>
      <div class="badge">Perplexity</div>
    </div>
  </div>
</body>
</html>
