apiVersion: 1

# Tempo datasource — distributed traces (Phase 16 Этап 3).
# trace-to-logs корреляция через Loki UID 'loki' (см. loki.yml derivedFields).

deleteDatasources:
  - name: Tempo

datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      # Связь Tempo trace → Loki logs через trace_id.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1m
        spanEndTimeShift: 1m
        tags:
          - key: service.name
            value: container
        filterByTraceID: true
        filterBySpanID: false
      # Связь Tempo trace → Prometheus metrics через service.name.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -1m
        spanEndTimeShift: 1m
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
