# Promtail config — собирает Docker container logs с host filesystem
# и пушит в Loki. Phase 16 Этап 2.
#
# Источник: /var/lib/docker/containers/*/*-json.log (Docker JSON log driver).
# JSON parser: каждая строка — JSON объект {log, stream, time}.
# Pipeline: extract Docker labels через Docker socket → static labels +
# JSON parse application slog → labels: container, service, level, trace_id.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name (без ведущего "/")
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Image для context.
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      # Compose service name из label.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - target_label: env
        replacement: production
    pipeline_stages:
      # Парсим Docker JSON wrapper: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # Используем извлечённый log как новую line.
      - output:
          source: log
      # Пытаемся парсить slog JSON output (api контейнер).
      # slog format: {"time":"...","level":"INFO","msg":"...","key":"value",...}
      - json:
          expressions:
            level: level
            msg: msg
            trace_id: trace_id
          drop_malformed: false
      # level становится Loki label (для фильтрации по severity).
      - labels:
          level:
      # Timestamp из slog (если есть), иначе Docker time.
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
          action_on_failure: skip
