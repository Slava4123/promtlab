# Loki single-binary config для self-hosted log aggregation на 1 VPS.
# Phase 16 Этап 2.
# Storage: filesystem, schema v13 (TSDB).
# Retention: 7 days (compactor удаляет старше).
# Auth: disabled (Loki в Docker network internal, не торчит наружу).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  max_query_timeout: 5m
  max_entries_limit_per_query: 5000
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 24
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 168h  # 7 days

# Compactor — реализует retention в filesystem mode.
compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Без ruler.alertmanager_url — alerts по логам пока не настраиваем.
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp
  ring:
    kvstore:
      store: inmemory
  enable_api: true
