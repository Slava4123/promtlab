global:
  resolve_timeout: 5m
  # Gmail SMTP, port 587 STARTTLS. Пароль читается из gitignored файла.
  # Email — единственный канал доставки alert'ов: Telegram Bot API заблокирован
  # с прод VPS Timeweb (РФ блокировка), Gmail SMTP проходит через IPv6.
  smtp_smarthost: smtp.gmail.com:587
  smtp_from: promstlab@gmail.com
  smtp_auth_username: promstlab@gmail.com
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp_password
  smtp_require_tls: true

route:
  # Один email-receiver для всех severity. Email-only deployment (см. global выше).
  receiver: email
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: email
    email_configs:
      - to: promstlab@gmail.com
        send_resolved: true
        headers:
          Subject: '[{{ .CommonLabels.severity | toUpper }}] {{ .CommonLabels.alertname }}'
        html: |
          <h3>{{ .CommonLabels.alertname }} — {{ .CommonLabels.severity }}</h3>
          <p>Status: <b>{{ .Status | toUpper }}</b></p>
          {{ range .Alerts }}
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          {{ if .Annotations.description }}<p><b>Description:</b> {{ .Annotations.description }}</p>{{ end }}
          {{ if .Annotations.runbook_url }}<p><a href="{{ .Annotations.runbook_url }}">📖 Runbook</a></p>{{ end }}
          {{ end }}
