global:
  resolve_timeout: 5m
  # SMTP — для email уведомлений на critical alerts (Phase 2 observability).
  # Gmail SMTP, port 587 STARTTLS. Пароль читается из gitignored файла.
  smtp_smarthost: smtp.gmail.com:587
  smtp_from: promstlab@gmail.com
  smtp_auth_username: promstlab@gmail.com
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp_password
  smtp_require_tls: true

route:
  receiver: telegram
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts дублируются на email + продолжают идти в Telegram через
    # parent route (continue: true). Warning остаётся только Telegram.
    - matchers:
        - severity="critical"
      receiver: email-critical
      continue: true

receivers:
  - name: telegram
    telegram_configs:
      # bot_token читается из файла (gitignored, кладётся на VPS вручную).
      - bot_token_file: /etc/alertmanager/secrets/bot_token
        # chat_id (numeric Telegram user ID) — placeholder=1 (явно invalid).
        # На VPS заменить через sed (см. инструкцию в docker-compose.prod.yml).
        # Alertmanager v0.27.0 не имеет chat_id_file (появился в v0.28+).
        # При апгрейде до v0.28 — заменить на chat_id_file для симметрии с bot_token.
        chat_id: 1
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}</b>
          severity: {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
          {{ end }}

  # Phase 2: SMTP fallback для critical alerts (redundancy против Telegram outage).
  # Owner email = promstlab@gmail.com (тот же что SMTP_FROM — простота для self-hosted).
  - name: email-critical
    email_configs:
      - to: promstlab@gmail.com
        send_resolved: true
        headers:
          Subject: '[ALERT] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
        html: |
          <h3>{{ .CommonLabels.alertname }} — {{ .CommonLabels.severity }}</h3>
          <p>Status: <b>{{ .Status | toUpper }}</b></p>
          {{ range .Alerts }}
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          {{ if .Annotations.description }}<p><b>Description:</b> {{ .Annotations.description }}</p>{{ end }}
          {{ end }}
