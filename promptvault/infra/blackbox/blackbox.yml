modules:
  # http_2xx — стандартный HTTP probe для public endpoints.
  # 302 разрешён (Grafana login redirect, frontend SPA initial redirect).
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: [200, 302]
      tls_config:
        insecure_skip_verify: false
      fail_if_ssl: false
      fail_if_not_ssl: true

  # http_api — для API endpoints, ожидаем строго 200 (без redirects).
  http_api_health:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: [200]
      fail_if_body_not_matches_regexp:
        - '"status":\s*"ok"'
