global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s
  external_labels:
    env: production
    service_group: promptvault

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'promptvault-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
        labels:
          service: api

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Phase 16 Этап 1.2: system + DB + container + uptime exporters
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: vps-host

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: containers

  # Blackbox external uptime probes — relabel магия для multi-target.
  # Sees probe_success{instance=<URL>}, probe_duration_seconds, probe_http_status_code.
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://promtlabs.ru/
          - https://grafana.promtlabs.ru/
          - https://sentry.promtlabs.ru/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Отдельный job для health endpoint — другой module (валидирует JSON body).
  - job_name: 'blackbox-api-health'
    metrics_path: /probe
    params:
      module: [http_api_health]
    static_configs:
      - targets:
          - https://promtlabs.ru/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
